<!-- AI Chat Widget (standalone markup) -->
<button class="chat-fab" type="button" aria-label="Open AI chat" aria-expanded="false">
  <span class="chat-fab-icon" aria-hidden="true">💬</span>
  <span class="chat-fab-label">Chat</span>
</button>

<div class="chat-panel" role="dialog" aria-label="AI chat" aria-modal="false" aria-hidden="true">
  <div class="chat-header">
    <div class="chat-title">
      <span class="chat-title-main">AI Assistant</span>
      <span class="chat-title-sub">IT helpdesk</span>
    </div>
    <button class="chat-close" type="button" aria-label="Close chat">✕</button>
  </div>

  <div class="chat-messages" id="chat-messages" role="log" aria-live="polite"></div>

  <div class="chat-typing" id="chat-typing" aria-hidden="true">
    <span class="dot" aria-hidden="true"></span>
    <span class="dot" aria-hidden="true"></span>
    <span class="dot" aria-hidden="true"></span>
    <span class="chat-typing-text">Thinking…</span>
  </div>

  <form class="chat-composer" id="chat-form">
    <label class="sr-only" for="chat-input">Message</label>
    <input id="chat-input" name="message" type="text" autocomplete="off" placeholder="Ask about networks, security, websites, tickets…" required maxlength="1200" />
    <button type="submit" class="chat-send" aria-label="Send message">Send</button>
  </form>

  <div class="chat-hint">
  </div>
</div>
